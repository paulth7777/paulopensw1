name: CI/CD Pipeline - Docker Build and Push

# main 브랜치에 코드가 push되거나 Pull Request가 열릴 때 동작합니다.
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# 환경 변수 설정
env:
  IMAGE_NAME: news-summarizer-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    # 1. GitHub 저장소의 코드를 가져옵니다.
    - name: Check out repository
      uses: actions/checkout@v4

    # 2. Docker 빌드 캐시 등을 활용하기 위해 Buildx 환경을 설정합니다.
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. GitHub Secrets에 저장된 자격 증명을 사용하여 Docker Hub에 로그인합니다.
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 4. 이미지 태그(버전)와 라벨을 자동으로 생성합니다. (최신 변경사항의 commit SHA 및 latest 태그)
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          type=sha

    # 5. Docker 이미지를 빌드하고 Docker Hub에 Push합니다.
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        # Pull Request일 때는 Push하지 않고 오류 없이 빌드되는지만 테스트합니다.
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # GitHub Actions 캐시 기능을 사용하여 빌드 시간을 단축시키는 최적화 옵션입니다.
        cache-from: type=gha
        cache-to: type=gha,mode=max
